name: BrunchFlow Core CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest httpx
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Run Integration Tests
      run: |
        pytest tests/
    
    - name: Build Docker Image (Agents)
      run: |
        docker build -f deploy/docker/Dockerfile.agents -t brunchflow-agents:latest .

    - name: Build Docker Image (Optimizer)
      run: |
        docker build -f deploy/docker/Dockerfile.optimizer -t brunchflow-optimizer:latest .
